name: Sync Withings Weight To Garmin

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARTH_TOKEN: ${{ secrets.GARTH_TOKEN }}
          GARTH_OAUTH1_TOKEN_JSON: ${{ secrets.GARTH_OAUTH1_TOKEN_JSON }}
          GARTH_OAUTH2_TOKEN_JSON: ${{ secrets.GARTH_OAUTH2_TOKEN_JSON }}
          WITHINGS_CLIENT_ID: ${{ secrets.WITHINGS_CLIENT_ID }}
          WITHINGS_CLIENT_SECRET: ${{ secrets.WITHINGS_CLIENT_SECRET }}
          WITHINGS_ACCESS_TOKEN: ${{ secrets.WITHINGS_ACCESS_TOKEN }}
          WITHINGS_REFRESH_TOKEN: ${{ secrets.WITHINGS_REFRESH_TOKEN }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '7' }}
        run: python sync_withings_to_garmin.py

      - name: Persist rotated Withings tokens to repository secrets
        if: always()
        env:
          GH_TOKEN: ${{ secrets.REPO_SECRETS_TOKEN }}
          GH_REPO: ${{ github.repository }}
          WITHINGS_ACCESS_TOKEN_UPDATED: ${{ env.WITHINGS_ACCESS_TOKEN_UPDATED }}
          WITHINGS_ACCESS_TOKEN_NEXT: ${{ env.WITHINGS_ACCESS_TOKEN_NEXT }}
          WITHINGS_REFRESH_TOKEN_UPDATED: ${{ env.WITHINGS_REFRESH_TOKEN_UPDATED }}
          WITHINGS_REFRESH_TOKEN_NEXT: ${{ env.WITHINGS_REFRESH_TOKEN_NEXT }}
        shell: bash
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "REPO_SECRETS_TOKEN is not configured; skipping secret update."
            exit 0
          fi

          if [[ "${WITHINGS_ACCESS_TOKEN_UPDATED}" != "true" && "${WITHINGS_REFRESH_TOKEN_UPDATED}" != "true" ]]; then
            echo "No rotated Withings tokens to persist."
            exit 0
          fi

          if [[ "${WITHINGS_ACCESS_TOKEN_UPDATED}" == "true" ]]; then
            gh secret set WITHINGS_ACCESS_TOKEN --body "${WITHINGS_ACCESS_TOKEN_NEXT}" --repo "${GH_REPO}"
            echo "Updated repository secret WITHINGS_ACCESS_TOKEN."
          fi

          if [[ "${WITHINGS_REFRESH_TOKEN_UPDATED}" == "true" ]]; then
            gh secret set WITHINGS_REFRESH_TOKEN --body "${WITHINGS_REFRESH_TOKEN_NEXT}" --repo "${GH_REPO}"
            echo "Updated repository secret WITHINGS_REFRESH_TOKEN."
          fi
